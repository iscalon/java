spring:
  main:
    allow-bean-definition-overriding: true
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  datasource:
    url: jdbc:h2:mem:datadb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false;AUTO_RECONNECT=true;
    username: sa
    password:
    driver-class-name: org.h2.Driver

    travail-batch:
      url: jdbc:h2:mem:batchdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false;AUTO_RECONNECT=true;
      username: sa
      password:
      driver-class-name: org.h2.Driver

  batch:
    jdbc:
      initialize-schema: embedded
    job:
      enabled: false

logging:
  level:
    org.springframework.jdbc.datasource.init: DEBUG